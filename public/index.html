<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shock Surplus Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--bg2:#1a1a1a;--bg3:#252525;--bg4:#333;--border:#333;--text:#e5e5e5;--text2:#999;--text3:#666;--accent:#e85d24;--accent2:#ff7a3d;--green:#34c759;--red:#ff453a;--yellow:#ffd60a;--blue:#0a84ff;--purple:#bf5af2;--teal:#30d5c8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header .meta{font-size:12px;color:var(--text2)}
.header .refresh-btn{padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.header .refresh-btn:hover{background:var(--accent2)}
.header .refresh-btn:disabled{background:var(--bg4);color:var(--text3);cursor:wait}
.container{max-width:1400px;margin:0 auto;padding:20px}
.loading{text-align:center;padding:60px;font-size:16px;color:var(--text2)}
.progress-bar{width:300px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.filter-pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s;user-select:none}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--border);border-top:3px solid var(--accent)}
.kpi .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .value{font-size:24px;font-weight:600;color:#fff}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--border)}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.chart-container{position:relative;height:280px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--accent);font-weight:600;color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--bg3);white-space:nowrap;color:var(--text)}
tr:hover td{background:var(--bg3)}
.grand-total td{font-weight:600;border-top:2px solid var(--accent);background:var(--bg3);color:#fff}
.table-scroll{overflow-x:auto;max-height:400px;overflow-y:auto}
.status-g{color:var(--green);font-weight:600}
.status-y{color:var(--yellow);font-weight:600}
.status-r{color:var(--red);font-weight:600}
.num{text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<div><h1>SHOCK SURPLUS</h1><div class="meta" id="status">Loading data...</div></div>
<button class="refresh-btn" id="refreshBtn" onclick="loadAll()">Refresh</button>
</div>
<div class="container">
<div id="loadingArea" class="loading"><div>Loading orders from Shopify...</div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div id="loadingDetail" style="margin-top:8px;font-size:13px">Fetching page 1...</div></div>
<div id="dashboard" style="display:none">
<div class="filters" id="filters"></div>
<div class="kpi-row" id="kpis"></div>
<div class="grid-2">
<div class="card"><h3>Revenue by rep</h3><div class="chart-container"><canvas id="repChart"></canvas></div></div>
<div class="card"><h3>Monthly trend</h3><div class="chart-container"><canvas id="monthChart"></canvas></div></div>
</div>
<div class="card" style="margin-bottom:16px"><h3>Rep summary</h3><div class="table-scroll" id="t1"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Draft sales by rep x sales type</h3><div class="table-scroll" id="t2"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Order count by rep x source</h3><div class="table-scroll" id="t3"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Vendor x rep</h3><div class="table-scroll" id="t4"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Rep x draft status</h3><div class="table-scroll" id="t5"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Channel performance</h3><div class="table-scroll" id="t6"></div></div>
<div class="card" style="margin-bottom:16px"><h3>KPIs vs targets</h3><div class="table-scroll" id="t7"></div></div>
</div></div>
<script>
Chart.defaults.color='#999';Chart.defaults.borderColor='#333';
let allOrders=[],allDrafts=[];let filters={rep:new Set(),month:new Set(),year:new Set(),salesType:new Set()};let repChart=null,monthChart=null;
const fmt=n=>'$'+Math.round(n).toLocaleString();const fmtD=n=>'$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});const pct=n=>Math.round(n*100)+'%';
const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];const monthOrder={};monthNames.forEach((m,i)=>monthOrder[m]=i);
function classifySalesType(tags,source){const t=(tags||'').toLowerCase();if(t.includes('phone'))return'Phone';if(t.includes('chat'))return'Chat';if(t.includes('email'))return'Email';if(t.includes('rich')||t.includes('slack'))return'Richpanel';if(t.includes('wholesale'))return'Wholesale';if(t.includes('rebuild'))return'Rebuild';if(t.includes('save'))return'Saved';if(t.includes('walk'))return'Walk In';if(t.includes('social')||t.includes('facebook')||t.includes('instagram'))return'Social';if(t.includes('f&f'))return'F&F';if(source==='shopify_draft_order')return'Draft Order';if(source==='web')return'Web';return'Other'}
async function fetchAllPages(endpoint){let all=[],sinceId='0',page=1;const key=endpoint.includes('draft')?'drafts':'orders';while(true){document.getElementById('loadingDetail').textContent=`Fetching ${key} page ${page}...`;const res=await fetch(`/api/${endpoint}?since_id=${sinceId}&days=60`);const data=await res.json();if(data.error){console.error(data.error);break}const items=data[key]||[];all=all.concat(items);document.getElementById('progressFill').style.width=Math.min(90,page*15)+'%';if(!data.hasMore||!data.lastId)break;sinceId=String(data.lastId);page++;await new Promise(r=>setTimeout(r,200))}return all}
async function loadAll(){document.getElementById('refreshBtn').disabled=true;document.getElementById('loadingArea').style.display='block';document.getElementById('dashboard').style.display='none';document.getElementById('progressFill').style.width='0%';allOrders=await fetchAllPages('orders');allOrders.forEach(o=>{o.sales_type=classifySalesType(o.tags,o.source)});document.getElementById('loadingDetail').textContent='Orders loaded. Fetching drafts...';document.getElementById('progressFill').style.width='50%';allDrafts=await fetchAllPages('draft-orders');allDrafts.forEach(o=>{o.sales_type=classifySalesType(o.tags,'')});document.getElementById('progressFill').style.width='100%';document.getElementById('loadingArea').style.display='none';document.getElementById('dashboard').style.display='block';document.getElementById('refreshBtn').disabled=false;const now=new Date();document.getElementById('status').textContent=`Last refreshed: ${now.toLocaleTimeString()} | ${allOrders.length} order lines | ${allDrafts.length} draft lines`;filters={rep:new Set(),month:new Set(),year:new Set(),salesType:new Set()};buildFilters();render()}
function buildFilters(){const reps=new Set(),months=new Set(),years=new Set(),types=new Set();[...allOrders,...allDrafts].forEach(o=>{if(o.rep&&o.rep!=='Unassigned'&&o.rep!=='Steve')reps.add(o.rep);const d=new Date(o.created_at);months.add(monthNames[d.getMonth()]);years.add(d.getFullYear());if(o.sales_type)types.add(o.sales_type)});let html='';html+=buildFilterGroup('Rep','rep',[...reps].sort());html+=buildFilterGroup('Month','month',[...months].sort((a,b)=>monthOrder[a]-monthOrder[b]));html+=buildFilterGroup('Year','year',[...years].sort());document.getElementById('filters').innerHTML=html;document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{const key=p.dataset.key,val=p.dataset.val;if(val==='__ALL__'){filters[key].clear();document.querySelectorAll(`.pill[data-key="${key}"]`).forEach(x=>x.classList.remove('active'));p.classList.add('active')}else{document.querySelector(`.pill[data-key="${key}"][data-val="__ALL__"]`).classList.remove('active');p.classList.toggle('active');if(p.classList.contains('active'))filters[key].add(val);else filters[key].delete(val);if(filters[key].size===0)document.querySelector(`.pill[data-key="${key}"][data-val="__ALL__"]`).classList.add('active')}render()})})}
function buildFilterGroup(label,key,values){let html=`<div class="filter-group"><div class="filter-label">${label}</div><div class="filter-pills"><div class="pill active" data-key="${key}" data-val="__ALL__">All</div>`;values.forEach(v=>{html+=`<div class="pill" data-key="${key}" data-val="${v}">${v}</div>`});return html+'</div></div>'}
function applyFilters(data){return data.filter(o=>{if(filters.rep.size&&!filters.rep.has(o.rep))return false;if(filters.salesType.size&&!filters.salesType.has(o.sales_type))return false;const d=new Date(o.created_at);if(filters.month.size&&!filters.month.has(monthNames[d.getMonth()]))return false;if(filters.year.size&&!filters.year.has(String(d.getFullYear())))return false;return true})}
function getUniqueOrders(data){const seen=new Set();return data.filter(o=>{const key=o.id+'_'+o.rep;if(seen.has(key))return false;seen.add(key);return true})}
function render(){const orders=applyFilters(allOrders),drafts=applyFilters(allDrafts),uo=getUniqueOrders(orders),ud=getUniqueOrders(drafts);renderKPIs(uo,ud);renderRepChart(uo);renderMonthChart(uo);renderRepSummary(uo);renderDraftSalesType(ud);renderRepSource(uo);renderVendorRep(drafts);renderRepStatus(ud);renderChannelPerf(uo);renderKPITable(uo,ud)}
function renderKPIs(orders,drafts){const rev=orders.reduce((s,o)=>s+o.subtotal,0),cnt=orders.length,aov=cnt?rev/cnt:0,dc=drafts.length,od=drafts.filter(d=>d.status==='open').length;document.getElementById('kpis').innerHTML=[{l:'Revenue',v:fmtD(rev)},{l:'Orders',v:cnt.toLocaleString()},{l:'AOV',v:fmtD(aov)},{l:'Drafts sent',v:dc.toLocaleString()},{l:'Open drafts',v:od.toLocaleString()}].map(k=>`<div class="kpi"><div class="label">${k.l}</div><div class="value">${k.v}</div></div>`).join('')}
const cc=['#e85d24','#ff7a3d','#30d5c8','#0a84ff','#bf5af2','#ffd60a','#34c759','#ff453a','#ff9f0a','#5e5ce6'];
function renderRepChart(orders){const rt={};orders.forEach(o=>{rt[o.rep]=(rt[o.rep]||0)+o.subtotal});const sorted=Object.entries(rt).sort((a,b)=>b[1]-a[1]).filter(([k])=>k!=='Unassigned'&&k!=='Steve');if(repChart)repChart.destroy();repChart=new Chart(document.getElementById('repChart'),{type:'bar',data:{labels:sorted.map(([k])=>k),datasets:[{data:sorted.map(([,v])=>v),backgroundColor:sorted.map((_,i)=>cc[i%cc.length]),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'#252525'}},y:{grid:{display:false}}}}})}
function renderMonthChart(orders){const mt={};orders.forEach(o=>{const d=new Date(o.created_at),k=monthNames[d.getMonth()];mt[k]=(mt[k]||0)+o.subtotal});const sorted=monthNames.filter(m=>mt[m]);if(monthChart)monthChart.destroy();monthChart=new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:sorted.map(m=>m.slice(0,3)),datasets:[{data:sorted.map(m=>mt[m]||0),backgroundColor:'#e85d24',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:false}},y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'#252525'}}}}})}
function renderRepSummary(orders){const reps={};orders.forEach(o=>{if(!reps[o.rep])reps[o.rep]={rev:0,cnt:0};reps[o.rep].rev+=o.subtotal;reps[o.rep].cnt++});const sorted=Object.entries(reps).filter(([k])=>k!=='Unassigned'&&k!=='Steve').sort((a,b)=>b[1].rev-a[1].rev);const tr=sorted.reduce((s,[,v])=>s+v.rev,0),tc=sorted.reduce((s,[,v])=>s+v.cnt,0);let h='<table><thead><tr><th>Rep</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">AOV</th></tr></thead><tbody>';sorted.forEach(([r,d])=>{h+=`<tr><td>${r}</td><td class="num">${fmtD(d.rev)}</td><td class="num">${d.cnt}</td><td class="num">${fmtD(d.cnt?d.rev/d.cnt:0)}</td></tr>`});h+=`<tr class="grand-total"><td>Grand Total</td><td class="num">${fmtD(tr)}</td><td class="num">${tc}</td><td class="num">${fmtD(tc?tr/tc:0)}</td></tr></tbody></table>`;document.getElementById('t1').innerHTML=h}
function renderDraftSalesType(drafts){const types=new Set(),reps={};drafts.forEach(d=>{types.add(d.sales_type);if(!reps[d.rep])reps[d.rep]={};if(!reps[d.rep][d.sales_type])reps[d.rep][d.sales_type]={val:0,cnt:0};reps[d.rep][d.sales_type].val+=d.subtotal;reps[d.rep][d.sales_type].cnt++});const st=[...types].sort(),sr=Object.keys(reps).filter(k=>k!=='Unassigned').sort();let h='<table><thead><tr><th>Rep</th>';st.forEach(t=>{h+=`<th class="num">${t} Value</th><th class="num">${t} Count</th>`});h+='<th class="num">Grand Total</th></tr></thead><tbody>';const gt={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;st.forEach(t=>{const d=(reps[rep]||{})[t]||{val:0,cnt:0};h+=`<td class="num">${d.val?fmtD(d.val):''}</td><td class="num">${d.cnt||''}</td>`;rt+=d.val;if(!gt[t])gt[t]={val:0,cnt:0};gt[t].val+=d.val;gt[t].cnt+=d.cnt});h+=`<td class="num">${fmtD(rt)}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;st.forEach(t=>{const d=gt[t]||{val:0,cnt:0};h+=`<td class="num">${fmtD(d.val)}</td><td class="num">${d.cnt}</td>`;g+=d.val});h+=`<td class="num">${fmtD(g)}</td></tr></tbody></table>`;document.getElementById('t2').innerHTML=h}
function renderRepSource(orders){const sources=new Set(),reps={};orders.forEach(o=>{const src=o.source==='shopify_draft_order'?'Draft Order':o.source==='web'?'Web':'Other';sources.add(src);if(!reps[o.rep])reps[o.rep]={};reps[o.rep][src]=(reps[o.rep][src]||0)+1});const ss=[...sources].sort(),sr=Object.keys(reps).filter(k=>k!=='Unassigned').sort();let h='<table><thead><tr><th>Rep</th>';ss.forEach(s=>{h+=`<th class="num">${s}</th>`});h+='<th class="num">Grand Total</th></tr></thead><tbody>';const totals={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;ss.forEach(s=>{const v=(reps[rep]||{})[s]||0;h+=`<td class="num">${v||''}</td>`;rt+=v;totals[s]=(totals[s]||0)+v});h+=`<td class="num">${rt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;ss.forEach(s=>{h+=`<td class="num">${totals[s]||0}</td>`;g+=totals[s]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t3').innerHTML=h}
function renderVendorRep(drafts){const vendors={},repSet=new Set();drafts.forEach(d=>{if(!d.vendor)return;repSet.add(d.rep);if(!vendors[d.vendor])vendors[d.vendor]={};vendors[d.vendor][d.rep]=(vendors[d.vendor][d.rep]||0)+1});const sr=[...repSet].filter(k=>k!=='Unassigned'&&k!=='Steve').sort();const sv=Object.entries(vendors).sort((a,b)=>{const ta=Object.values(a[1]).reduce((s,v)=>s+v,0),tb=Object.values(b[1]).reduce((s,v)=>s+v,0);return tb-ta});let h='<table><thead><tr><th>Vendor</th>';sr.forEach(r=>{h+=`<th class="num">${r}</th>`});h+='<th class="num">Grand Total</th></tr></thead><tbody>';const rt={};sv.forEach(([vendor,data])=>{h+=`<tr><td>${vendor}</td>`;let vt=0;sr.forEach(r=>{const v=data[r]||0;h+=`<td class="num">${v||''}</td>`;vt+=v;rt[r]=(rt[r]||0)+v});h+=`<td class="num">${vt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;sr.forEach(r=>{h+=`<td class="num">${rt[r]||0}</td>`;g+=rt[r]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t4').innerHTML=h}
function renderRepStatus(drafts){const statuses=new Set(),reps={};drafts.forEach(d=>{statuses.add(d.status);if(!reps[d.rep])reps[d.rep]={};reps[d.rep][d.status]=(reps[d.rep][d.status]||0)+1});const ss=[...statuses].sort(),sr=Object.keys(reps).filter(k=>k!=='Unassigned').sort();let h='<table><thead><tr><th>Rep</th>';ss.forEach(s=>{h+=`<th class="num">${s}</th>`});h+='<th class="num">Grand Total</th></tr></thead><tbody>';const totals={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;ss.forEach(s=>{const v=(reps[rep]||{})[s]||0;h+=`<td class="num">${v||''}</td>`;rt+=v;totals[s]=(totals[s]||0)+v});h+=`<td class="num">${rt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;ss.forEach(s=>{h+=`<td class="num">${totals[s]||0}</td>`;g+=totals[s]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t5').innerHTML=h}
function renderChannelPerf(orders){const ch={};orders.forEach(o=>{if(!ch[o.sales_type])ch[o.sales_type]={rev:0,cnt:0};ch[o.sales_type].rev+=o.subtotal;ch[o.sales_type].cnt++});const sorted=Object.entries(ch).sort((a,b)=>b[1].rev-a[1].rev);const tr=sorted.reduce((s,[,v])=>s+v.rev,0),tc=sorted.reduce((s,[,v])=>s+v.cnt,0);let h='<table><thead><tr><th>Channel</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">AOV</th><th class="num">% of Total</th></tr></thead><tbody>';sorted.forEach(([c,d])=>{h+=`<tr><td>${c}</td><td class="num">${fmtD(d.rev)}</td><td class="num">${d.cnt}</td><td class="num">${fmtD(d.cnt?d.rev/d.cnt:0)}</td><td class="num">${pct(tr?d.rev/tr:0)}</td></tr>`});h+=`<tr class="grand-total"><td>Total</td><td class="num">${fmtD(tr)}</td><td class="num">${tc}</td><td class="num">${fmtD(tc?tr/tc:0)}</td><td class="num">100%</td></tr></tbody></table>`;document.getElementById('t6').innerHTML=h}
function renderKPITable(orders,drafts){const rev=orders.reduce((s,o)=>s+o.subtotal,0),cnt=orders.length,aov=cnt?rev/cnt:0,dc=drafts.length,od=drafts.filter(d=>d.status==='open').length;const kpis=[{name:'Total Revenue',target:1125000,actual:rev,fmt:fmtD},{name:'Total Orders',target:750,actual:cnt,fmt:v=>v.toLocaleString()},{name:'AOV',target:800,actual:aov,fmt:fmtD},{name:'Drafts Sent',target:400,actual:dc,fmt:v=>v.toLocaleString()},{name:'Open Drafts',target:null,actual:od,fmt:v=>v.toLocaleString()}];let h='<table><thead><tr><th>KPI</th><th class="num">Target</th><th class="num">Actual</th><th class="num">% to Goal</th><th>Status</th></tr></thead><tbody>';kpis.forEach(k=>{const p=k.target?k.actual/k.target:null;const s=p===null?'':p>=1?'G':p>=0.7?'Y':'R';const sc=s==='G'?'status-g':s==='Y'?'status-y':s==='R'?'status-r':'';h+=`<tr><td>${k.name}</td><td class="num">${k.target!==null?k.fmt(k.target):''}</td><td class="num">${k.fmt(k.actual)}</td><td class="num">${p!==null?pct(p):''}</td><td class="${sc}">${s}</td></tr>`});h+='</tbody></table>';document.getElementById('t7').innerHTML=h}
loadAll();
</script>
</body></html>
