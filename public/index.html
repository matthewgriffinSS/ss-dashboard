<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shock Surplus Sales Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d0d0d;--bg2:#1a1a1a;--bg3:#252525;--bg4:#333;--border:#333;--text:#e5e5e5;--text2:#999;--text3:#666;--accent:#e85d24;--accent2:#ff7a3d;--green:#34c759;--red:#ff453a;--yellow:#ffd60a;--blue:#0a84ff;--purple:#bf5af2;--teal:#30d5c8}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:600;color:var(--accent);letter-spacing:1px}
.header .meta{font-size:12px;color:var(--text2)}
.container{max-width:1400px;margin:0 auto;padding:20px}
.loading{text-align:center;padding:60px;font-size:16px;color:var(--text2)}
.progress-bar{width:300px;height:4px;background:var(--bg3);border-radius:2px;margin:12px auto}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.date-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;padding:12px 16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.date-bar label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.date-btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-weight:500;transition:all .15s}
.date-btn:hover{border-color:var(--accent);color:var(--accent)}
.date-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.date-input{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:12px}
.date-input::-webkit-calendar-picker-indicator{filter:invert(1)}
.go-btn{padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:600}
.go-btn:hover{background:var(--accent2)}
.go-btn:disabled{background:var(--bg4);color:var(--text3);cursor:wait}
.cache-info{font-size:11px;color:var(--teal);margin-left:auto}
.filters{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:20px;padding:16px;background:var(--bg2);border-radius:12px;border:1px solid var(--border)}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.filter-pills{display:flex;flex-wrap:wrap;gap:4px}
.pill{padding:4px 10px;border-radius:14px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--bg2);color:var(--text2);transition:all .15s;user-select:none}
.pill:hover{border-color:var(--accent);color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--border);border-top:3px solid var(--accent)}
.kpi .label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi .value{font-size:24px;font-weight:600;color:#fff}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--bg2);border-radius:12px;padding:16px;border:1px solid var(--border)}
.card h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.chart-container{position:relative;height:280px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--accent);font-weight:600;color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
td{padding:6px;border-bottom:1px solid var(--bg3);white-space:nowrap;color:var(--text)}
tr:hover td{background:var(--bg3)}
.grand-total td{font-weight:600;border-top:2px solid var(--accent);background:var(--bg3);color:#fff}
.table-scroll{overflow-x:auto;max-height:400px;overflow-y:auto}
.status-g{color:var(--green);font-weight:600}
.status-y{color:var(--yellow);font-weight:600}
.status-r{color:var(--red);font-weight:600}
.num{text-align:right;font-variant-numeric:tabular-nums}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="header">
<div><h1>SHOCK SURPLUS</h1><div class="meta" id="status">Select a date range to load data</div></div>
</div>
<div class="container">
<div class="date-bar">
<label>Date range</label>
<button class="date-btn" onclick="setPreset('thisWeek',this)">This week</button>
<button class="date-btn" onclick="setPreset('thisMonth',this)">This month</button>
<button class="date-btn" onclick="setPreset('lastMonth',this)">Last month</button>
<button class="date-btn" onclick="setPreset('thisQuarter',this)">This quarter</button>
<button class="date-btn" onclick="setPreset('thisYear',this)">This year</button>
<button class="date-btn" onclick="setPreset('lastYear',this)">Last year</button>
<span style="color:var(--text3);margin:0 4px">|</span>
<input type="date" id="dateFrom" class="date-input">
<span style="color:var(--text3)">to</span>
<input type="date" id="dateTo" class="date-input">
<button class="go-btn" id="goBtn" onclick="loadAll()">Load data</button>
<span class="cache-info" id="cacheInfo"></span>
</div>
<div id="loadingArea" class="loading" style="display:none"><div>Loading from Shopify...</div><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div id="loadingDetail" style="margin-top:8px;font-size:13px"></div></div>
<div id="dashboard" style="display:none">
<div class="filters" id="filters"></div>
<div class="kpi-row" id="kpis"></div>
<div class="grid-2">
<div class="card"><h3>Revenue by rep</h3><div class="chart-container"><canvas id="repChart"></canvas></div></div>
<div class="card"><h3>Monthly trend</h3><div class="chart-container"><canvas id="monthChart"></canvas></div></div>
</div>
<div class="card" style="margin-bottom:16px"><h3>Rep summary</h3><div class="table-scroll" id="t1"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Draft sales by rep x sales type</h3><div class="table-scroll" id="t2"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Order count by rep x source</h3><div class="table-scroll" id="t3"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Vendor x rep</h3><div class="table-scroll" id="t4"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Rep x draft status</h3><div class="table-scroll" id="t5"></div></div>
<div class="card" style="margin-bottom:16px"><h3>Channel performance</h3><div class="table-scroll" id="t6"></div></div>
<div class="card" style="margin-bottom:16px"><h3>KPIs vs targets</h3><div class="table-scroll" id="t7"></div></div>
</div></div>
<script>
Chart.defaults.color='#999';Chart.defaults.borderColor='#333';
let allOrders=[],allDrafts=[],filters={rep:new Set(),month:new Set()},repChart=null,monthChart=null;
const fmtD=n=>'$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
const pct=n=>Math.round(n*100)+'%';
const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MO={};MN.forEach((m,i)=>MO[m]=i);

function setPreset(p,el){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();let f,t;
  if(p==='thisWeek'){const d=now.getDay(),diff=d===0?6:d-1;f=new Date(now);f.setDate(now.getDate()-diff);t=now}
  else if(p==='thisMonth'){f=new Date(y,m,1);t=now}
  else if(p==='lastMonth'){f=new Date(y,m-1,1);t=new Date(y,m,0)}
  else if(p==='thisQuarter'){const q=Math.floor(m/3)*3;f=new Date(y,q,1);t=now}
  else if(p==='thisYear'){f=new Date(y,0,1);t=now}
  else if(p==='lastYear'){f=new Date(y-1,0,1);t=new Date(y-1,11,31)}
  document.getElementById('dateFrom').value=f.toISOString().split('T')[0];
  document.getElementById('dateTo').value=t.toISOString().split('T')[0];
  document.querySelectorAll('.date-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  loadAll();
}

async function loadAll(){
  const dMin=document.getElementById('dateFrom').value,dMax=document.getElementById('dateTo').value;
  if(!dMin||!dMax){alert('Select a date range first');return}
  document.getElementById('goBtn').disabled=true;
  document.getElementById('loadingArea').style.display='block';
  document.getElementById('dashboard').style.display='none';
  document.getElementById('progressFill').style.width='10%';
  document.getElementById('loadingDetail').textContent='Fetching orders...';

  try{
    const oRes=await fetch(`/api/orders?date_min=${dMin}&date_max=${dMax}`);
    const oData=await oRes.json();
    if(oData.error){document.getElementById('loadingDetail').textContent='Error: '+oData.error;return}
    allOrders=oData.orders||[];
    const oCache=oData.cache||{};

    document.getElementById('progressFill').style.width='50%';
    document.getElementById('loadingDetail').textContent='Fetching drafts...';

    const dRes=await fetch(`/api/draft-orders?date_min=${dMin}&date_max=${dMax}`);
    const dData=await dRes.json();
    if(dData.error){document.getElementById('loadingDetail').textContent='Error: '+dData.error;return}
    allDrafts=dData.drafts||[];
    const dCache=dData.cache||{};

    document.getElementById('progressFill').style.width='100%';

    // Show cache status
    const allCache={...oCache,...dCache};
    const cached=Object.values(allCache).filter(v=>v==='cached').length;
    const fetched=Object.values(allCache).filter(v=>v!=='cached').length;
    document.getElementById('cacheInfo').textContent=cached?`${cached} months from cache, ${fetched} fetched live`:`${fetched} months fetched live`;

    document.getElementById('loadingArea').style.display='none';
    document.getElementById('dashboard').style.display='block';
    document.getElementById('status').textContent=`${dMin} to ${dMax} | ${allOrders.length} order lines | ${allDrafts.length} draft lines | ${new Date().toLocaleTimeString()}`;
  }catch(e){
    document.getElementById('loadingDetail').textContent='Error: '+e.message;
  }finally{
    document.getElementById('goBtn').disabled=false;
  }
  filters={rep:new Set(),month:new Set()};buildFilters();render();
}

function buildFilters(){
  const reps=new Set(),months=new Set();
  [...allOrders,...allDrafts].forEach(o=>{if(o.rep)reps.add(o.rep);months.add(MN[new Date(o.created_at).getMonth()])});
  let h='';h+=bfg('Rep','rep',[...reps].sort());h+=bfg('Month','month',[...months].sort((a,b)=>MO[a]-MO[b]));
  document.getElementById('filters').innerHTML=h;
  document.querySelectorAll('.pill').forEach(p=>{p.addEventListener('click',()=>{
    const k=p.dataset.key,v=p.dataset.val;
    if(v==='__ALL__'){filters[k].clear();document.querySelectorAll(`.pill[data-key="${k}"]`).forEach(x=>x.classList.remove('active'));p.classList.add('active')}
    else{document.querySelector(`.pill[data-key="${k}"][data-val="__ALL__"]`).classList.remove('active');p.classList.toggle('active');if(p.classList.contains('active'))filters[k].add(v);else filters[k].delete(v);if(filters[k].size===0)document.querySelector(`.pill[data-key="${k}"][data-val="__ALL__"]`).classList.add('active')}
    render()})});
}
function bfg(label,key,vals){let h=`<div class="filter-group"><div class="filter-label">${label}</div><div class="filter-pills"><div class="pill active" data-key="${key}" data-val="__ALL__">All</div>`;vals.forEach(v=>{h+=`<div class="pill" data-key="${key}" data-val="${v}">${v}</div>`});return h+'</div></div>'}
function af(data){return data.filter(o=>{if(filters.rep.size&&!filters.rep.has(o.rep))return false;if(filters.month.size&&!filters.month.has(MN[new Date(o.created_at).getMonth()]))return false;return true})}
function uq(data){const s=new Set();return data.filter(o=>{const k=o.id+'_'+o.rep;if(s.has(k))return false;s.add(k);return true})}
function render(){const o=af(allOrders),d=af(allDrafts),uo=uq(o),ud=uq(d);rKPI(uo,ud);rRC(uo);rMC(uo);rT1(uo);rT2(ud);rT3(uo);rT4(d);rT5(ud);rT6(uo);rT7(uo,ud)}
function rKPI(o,d){const rev=o.reduce((s,x)=>s+x.subtotal,0),cnt=o.length,aov=cnt?rev/cnt:0,dc=d.length,od=d.filter(x=>x.status==='open').length;document.getElementById('kpis').innerHTML=[{l:'Revenue',v:fmtD(rev)},{l:'Orders',v:cnt.toLocaleString()},{l:'AOV',v:fmtD(aov)},{l:'Drafts sent',v:dc.toLocaleString()},{l:'Open drafts',v:od.toLocaleString()}].map(k=>`<div class="kpi"><div class="label">${k.l}</div><div class="value">${k.v}</div></div>`).join('')}
const cc=['#e85d24','#ff7a3d','#30d5c8','#0a84ff','#bf5af2','#ffd60a','#34c759','#ff453a','#ff9f0a','#5e5ce6'];
function rRC(o){const rt={};o.forEach(x=>{rt[x.rep]=(rt[x.rep]||0)+x.subtotal});const s=Object.entries(rt).sort((a,b)=>b[1]-a[1]);if(repChart)repChart.destroy();repChart=new Chart(document.getElementById('repChart'),{type:'bar',data:{labels:s.map(([k])=>k),datasets:[{data:s.map(([,v])=>v),backgroundColor:s.map((_,i)=>cc[i%cc.length]),borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'#252525'}},y:{grid:{display:false}}}}})}
function rMC(o){const mt={};o.forEach(x=>{const k=MN[new Date(x.created_at).getMonth()];mt[k]=(mt[k]||0)+x.subtotal});const s=MN.filter(m=>mt[m]);if(monthChart)monthChart.destroy();monthChart=new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:s.map(m=>m.slice(0,3)),datasets:[{data:s.map(m=>mt[m]||0),backgroundColor:'#e85d24',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{autoSkip:false}},y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k'},grid:{color:'#252525'}}}}})}
function rT1(o){const reps={};o.forEach(x=>{if(!reps[x.rep])reps[x.rep]={rev:0,cnt:0};reps[x.rep].rev+=x.subtotal;reps[x.rep].cnt++});const s=Object.entries(reps).sort((a,b)=>b[1].rev-a[1].rev);const tr=s.reduce((a,[,v])=>a+v.rev,0),tc=s.reduce((a,[,v])=>a+v.cnt,0);let h='<table><thead><tr><th>Rep</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">AOV</th></tr></thead><tbody>';s.forEach(([r,d])=>{h+=`<tr><td>${r}</td><td class="num">${fmtD(d.rev)}</td><td class="num">${d.cnt}</td><td class="num">${fmtD(d.cnt?d.rev/d.cnt:0)}</td></tr>`});h+=`<tr class="grand-total"><td>Grand Total</td><td class="num">${fmtD(tr)}</td><td class="num">${tc}</td><td class="num">${fmtD(tc?tr/tc:0)}</td></tr></tbody></table>`;document.getElementById('t1').innerHTML=h}
function rT2(d){const types=new Set(),reps={};d.forEach(x=>{types.add(x.sales_type);if(!reps[x.rep])reps[x.rep]={};if(!reps[x.rep][x.sales_type])reps[x.rep][x.sales_type]={val:0,cnt:0};reps[x.rep][x.sales_type].val+=x.subtotal;reps[x.rep][x.sales_type].cnt++});const st=[...types].sort(),sr=Object.keys(reps).sort();let h='<table><thead><tr><th>Rep</th>';st.forEach(t=>{h+=`<th class="num">${t} Value</th><th class="num">${t} Count</th>`});h+='<th class="num">Total</th></tr></thead><tbody>';const gt={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;st.forEach(t=>{const v=(reps[rep]||{})[t]||{val:0,cnt:0};h+=`<td class="num">${v.val?fmtD(v.val):''}</td><td class="num">${v.cnt||''}</td>`;rt+=v.val;if(!gt[t])gt[t]={val:0,cnt:0};gt[t].val+=v.val;gt[t].cnt+=v.cnt});h+=`<td class="num">${fmtD(rt)}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;st.forEach(t=>{const v=gt[t]||{val:0,cnt:0};h+=`<td class="num">${fmtD(v.val)}</td><td class="num">${v.cnt}</td>`;g+=v.val});h+=`<td class="num">${fmtD(g)}</td></tr></tbody></table>`;document.getElementById('t2').innerHTML=h}
function rT3(o){const sources=new Set(),reps={};o.forEach(x=>{const src=x.source==='shopify_draft_order'?'Draft Order':x.source==='web'?'Web':'Other';sources.add(src);if(!reps[x.rep])reps[x.rep]={};reps[x.rep][src]=(reps[x.rep][src]||0)+1});const ss=[...sources].sort(),sr=Object.keys(reps).sort();let h='<table><thead><tr><th>Rep</th>';ss.forEach(s=>{h+=`<th class="num">${s}</th>`});h+='<th class="num">Total</th></tr></thead><tbody>';const tot={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;ss.forEach(s=>{const v=(reps[rep]||{})[s]||0;h+=`<td class="num">${v||''}</td>`;rt+=v;tot[s]=(tot[s]||0)+v});h+=`<td class="num">${rt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;ss.forEach(s=>{h+=`<td class="num">${tot[s]||0}</td>`;g+=tot[s]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t3').innerHTML=h}
function rT4(d){const vendors={},rs=new Set();d.forEach(x=>{if(!x.vendor)return;rs.add(x.rep);if(!vendors[x.vendor])vendors[x.vendor]={};vendors[x.vendor][x.rep]=(vendors[x.vendor][x.rep]||0)+1});const sr=[...rs].sort();const sv=Object.entries(vendors).sort((a,b)=>{const ta=Object.values(a[1]).reduce((s,v)=>s+v,0),tb=Object.values(b[1]).reduce((s,v)=>s+v,0);return tb-ta});let h='<table><thead><tr><th>Vendor</th>';sr.forEach(r=>{h+=`<th class="num">${r}</th>`});h+='<th class="num">Total</th></tr></thead><tbody>';const rt={};sv.forEach(([v,data])=>{h+=`<tr><td>${v}</td>`;let vt=0;sr.forEach(r=>{const c=data[r]||0;h+=`<td class="num">${c||''}</td>`;vt+=c;rt[r]=(rt[r]||0)+c});h+=`<td class="num">${vt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;sr.forEach(r=>{h+=`<td class="num">${rt[r]||0}</td>`;g+=rt[r]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t4').innerHTML=h}
function rT5(d){const statuses=new Set(),reps={};d.forEach(x=>{statuses.add(x.status);if(!reps[x.rep])reps[x.rep]={};reps[x.rep][x.status]=(reps[x.rep][x.status]||0)+1});const ss=[...statuses].sort(),sr=Object.keys(reps).sort();let h='<table><thead><tr><th>Rep</th>';ss.forEach(s=>{h+=`<th class="num">${s}</th>`});h+='<th class="num">Total</th></tr></thead><tbody>';const tot={};sr.forEach(rep=>{h+=`<tr><td>${rep}</td>`;let rt=0;ss.forEach(s=>{const v=(reps[rep]||{})[s]||0;h+=`<td class="num">${v||''}</td>`;rt+=v;tot[s]=(tot[s]||0)+v});h+=`<td class="num">${rt}</td></tr>`});h+='<tr class="grand-total"><td>Grand Total</td>';let g=0;ss.forEach(s=>{h+=`<td class="num">${tot[s]||0}</td>`;g+=tot[s]||0});h+=`<td class="num">${g}</td></tr></tbody></table>`;document.getElementById('t5').innerHTML=h}
function rT6(o){const ch={};o.forEach(x=>{if(!ch[x.sales_type])ch[x.sales_type]={rev:0,cnt:0};ch[x.sales_type].rev+=x.subtotal;ch[x.sales_type].cnt++});const s=Object.entries(ch).sort((a,b)=>b[1].rev-a[1].rev);const tr=s.reduce((a,[,v])=>a+v.rev,0),tc=s.reduce((a,[,v])=>a+v.cnt,0);let h='<table><thead><tr><th>Channel</th><th class="num">Revenue</th><th class="num">Orders</th><th class="num">AOV</th><th class="num">% of Total</th></tr></thead><tbody>';s.forEach(([c,d])=>{h+=`<tr><td>${c}</td><td class="num">${fmtD(d.rev)}</td><td class="num">${d.cnt}</td><td class="num">${fmtD(d.cnt?d.rev/d.cnt:0)}</td><td class="num">${pct(tr?d.rev/tr:0)}</td></tr>`});h+=`<tr class="grand-total"><td>Total</td><td class="num">${fmtD(tr)}</td><td class="num">${tc}</td><td class="num">${fmtD(tc?tr/tc:0)}</td><td class="num">100%</td></tr></tbody></table>`;document.getElementById('t6').innerHTML=h}
function rT7(o,d){const rev=o.reduce((s,x)=>s+x.subtotal,0),cnt=o.length,aov=cnt?rev/cnt:0,dc=d.length,od=d.filter(x=>x.status==='open').length;const kpis=[{n:'Total Revenue',t:1125000,a:rev,f:fmtD},{n:'Total Orders',t:750,a:cnt,f:v=>v.toLocaleString()},{n:'AOV',t:800,a:aov,f:fmtD},{n:'Drafts Sent',t:400,a:dc,f:v=>v.toLocaleString()},{n:'Open Drafts',t:null,a:od,f:v=>v.toLocaleString()}];let h='<table><thead><tr><th>KPI</th><th class="num">Target</th><th class="num">Actual</th><th class="num">% to Goal</th><th>Status</th></tr></thead><tbody>';kpis.forEach(k=>{const p=k.t?k.a/k.t:null;const s=p===null?'':p>=1?'G':p>=0.7?'Y':'R';const sc=s==='G'?'status-g':s==='Y'?'status-y':s==='R'?'status-r':'';h+=`<tr><td>${k.n}</td><td class="num">${k.t!==null?k.f(k.t):''}</td><td class="num">${k.f(k.a)}</td><td class="num">${p!==null?pct(p):''}</td><td class="${sc}">${s}</td></tr>`});h+='</tbody></table>';document.getElementById('t7').innerHTML=h}
(function(){const now=new Date();document.getElementById('dateFrom').value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().split('T')[0];document.getElementById('dateTo').value=now.toISOString().split('T')[0]})();
</script>
